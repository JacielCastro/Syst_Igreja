<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Login Syst_igreja </title>
    <link rel="stylesheet" href="/src/public/style/login.css">
</head>

<body>
    <div class="login-container">
        <h1> Paroquia de Sant´Ana </h1>
        <img src="/src/view/img_santana.jpg" alt="Logo da Paróquia de Sant´Ana" width="200">
        <h1> Login </h1>
        <form action="/src/public/src/login.js" method="POST">
            <label for="username">Nome de usuário:</label>
            <input type="text" id="username" name="username" required>
            <br>
            <label for="password">Senha:</label>
            <input type="password" id="password" name="password" required>
            <br>
            <button type="submit">Entrar</button>   
        </form>
</div>
</body>
</html>
