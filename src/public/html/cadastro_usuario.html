<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Cadastro de Agentes </title>
    <link rel="stylesheet" href="/src/public/style/cadastroUsua.css">
</head>
<body>

    <div class="cadastro-container">
        
        <h1> Cadastro de Agentes </h1>
        <p class="santana">Paróquia de Sant'Ana</p>
        
        <img src="/src/view/img_santana.jpg" alt="Logo da Paróquia de Sant´Ana">
        
        <form action="/src/public/src/cadastro_usuario.js" method="POST">
            <label for="username">Nome de usuário:</label>
            <input type="text" id="username" name="username" required>
            
            <label for="telefone">Telefone:</label>
            <input type="tel" id="telefone" name="telefone" required>
            
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            
            <label for="pastoral">Pastoral:</label>
            <select name="pastoral" id="pastoral" required>
                <option value="">Selecione uma pastoral</option>
                <option value="pastoral1">Pastoral Família</option>
                <option value="pastoral2">Pascom</option>
                <option value="pastoral3">Liturgia</option>
                <option value="pastoral4">Pastoral da Criança</option>
                <option value="pastoral5">Pastoral do povo de rua</option>
                <option value="pastoral6">Pastoral do Dízimo</option>
            </select>
            
            <label for="nivel_acesso">Nível de Acesso:</label>
            <select name="nivel_acesso" id="nivel_acesso" required>
                <option value="">Selecione o nível de acesso</option>
                <option value="admin">Coordenador</option>
                <option value="user">Vice-coordenador</option>
            </select>
            
            <label for="password">Senha:</label>
            <input type="password" id="password" name="password" required>
            
            <button type="submit">Cadastrar</button>
        </form>
        
    </div>

</body>
</html>
